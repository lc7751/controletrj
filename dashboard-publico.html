<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle TRJ · Dashboard (visualização pública)</title>
<link rel="icon" href="assets/logo-trj.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: { bg: '#0a0a0f', card: '#13131a', popover: '#1a1a24', primary: '#ff8c00', fg: '#f0f0f0', muted: '#8a8a93' } } }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="js/config.js"></script>
<script src="js/constants.js"></script>
<script src="js/domain.js"></script>
<script src="js/compute.js"></script>
<script src="js/ui.js"></script>
<script src="js/pages/mapa.js"></script>
<style>
body { min-height: 100vh; }
#root { max-width: 1800px; margin: 0 auto; padding: 22px 28px; position: relative; z-index: 1; }

/* ---- Tela de boas-vindas ---- */
.welcome-wrap { min-height: 86vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
.welcome-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 18px; filter: drop-shadow(0 0 16px var(--trj-primary)); }
.welcome-title { font-family: 'Sora', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 6px; }
.welcome-sub { color: var(--trj-muted); font-size: 15px; margin-bottom: 34px; }
.regiao-grid { display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: center; gap: 12px; width: 100%; margin-bottom: 16px; }
@media (max-width: 900px) { .regiao-grid { flex-wrap: wrap; } }
@media (max-width: 640px) { .regiao-grid { grid-template-columns: repeat(2, 1fr); } }
.regiao-btn {
  position: relative; overflow: hidden; flex: 0 1 160px; min-width: 140px; max-width: 200px; background: var(--trj-card); border: 1px solid var(--trj-border);
  border-radius: 14px; padding: 22px 14px; cursor: pointer; transition: transform .22s cubic-bezier(.4,0,.2,1), border-color .22s ease, box-shadow .22s ease;
  display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--trj-fg);
}
.regiao-btn::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--trj-primary); opacity: 0; transition: opacity .22s ease; }
.regiao-btn:hover { transform: translateY(-5px); border-color: rgba(255,140,0,.55); box-shadow: 0 18px 38px rgba(0,0,0,.5), 0 0 26px rgba(255,140,0,.18); }
.regiao-btn:hover::before { opacity: 1; }
.regiao-btn .ic { font-size: 26px; transition: transform .22s ease; }
.regiao-btn:hover .ic { transform: scale(1.18) rotate(-3deg); }
.regiao-btn .nome { font-size: 14px; font-weight: 700; }
.regiao-btn .qtd { font-size: 11px; color: var(--trj-muted); }
.visao-geral-btn {
  width: 100%; max-width: 760px; background: rgba(255,140,0,.06); border: 1px solid rgba(255,140,0,.3);
  border-radius: 14px; padding: 16px; cursor: pointer; transition: all .22s ease; color: var(--trj-fg);
  display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; font-size: 14.5px;
}
.visao-geral-btn:hover { background: rgba(255,140,0,.12); border-color: var(--trj-primary); box-shadow: 0 10px 28px rgba(255,140,0,.18); transform: translateY(-2px); }

/* ---- barra superior da view de dashboard ---- */
.pub-topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
.pub-live { font-size: 11.5px; color: var(--trj-muted); display: flex; align-items: center; gap: 7px; }
.pub-live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--trj-green); box-shadow: 0 0 7px var(--trj-green); animation: trjPulseLive 2s infinite; }
@keyframes trjPulseLive { 0%,100%{opacity:1;} 50%{opacity:.35;} }
</style>
</head>
<body>
<div id="root"><div class="text-center py-20" style="color:var(--trj-muted)">Carregando dados publicados...</div></div>
<div id="dev-footer-mount" style="max-width:1400px;margin:0 auto;padding:0 22px;position:relative;z-index:1;"></div>

<script>
(function () {
  var U = TRJ.ui, C = TRJ.constants, D = TRJ.domain, Comp = TRJ.compute;
  var URL_API = (TRJ.config && TRJ.config.APPS_SCRIPT_URL) || '';
  var root = document.getElementById('root');

  var raw = { tasksEnriched: [], incidentsEnriched: [] };
  var savedAt = null;
  var view = 'welcome';
  var state = { regiao: 'TODAS', prioridade: 'TODAS' };

  var REGIAO_ICONS_SVG = {
    'INTERIOR': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="26" height="26"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    'BAIXADA': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="26" height="26"><rect x="3" y="9" width="18" height="13" rx="2"/><path d="M3 9l9-6 9 6"/><path d="M9 22V12h6v10"/></svg>',
    'GRANDE RJ': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="26" height="26"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>',
    'ZONA OESTE': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="26" height="26"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
    'ESPIRITO SANTO': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="26" height="26"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="M3 12h18"/><path d="M12 3c-2.5 2.5-4 5.5-4 9s1.5 6.5 4 9"/><path d="M12 3c2.5 2.5 4 5.5 4 9s-1.5 6.5-4 9"/></svg>',
    'OTHERS': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="26" height="26"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 6 8 14 8 14s8-8 8-14a8 8 0 0 0-8-8z"/></svg>'
  };

  // ── Carregamento ────────────────────────────────────────────────────────────
  async function carregarDados(silencioso) {
    if (!URL_API) { root.innerHTML = '<div class="text-center py-20" style="color:var(--trj-red)">URL do Apps Script não configurada (js/config.js).</div>'; return; }
    try {
      var resp = await fetch(URL_API + '?action=getDashboardSnapshot');
      var json = await resp.json();
      if (!json || json.ok === false) throw new Error((json && json.error) || 'Erro ao buscar dados.');
      if (!json.data) {
        if (!silencioso) root.innerHTML = '<div class="text-center py-20" style="color:var(--trj-muted)">Ainda não há nenhuma publicação.<br>Abra o Dashboard no painel principal pelo menos uma vez.</div>';
        return;
      }
      raw.tasksEnriched = json.data.tasksEnriched || [];
      raw.incidentsEnriched = json.data.incidentsEnriched || [];
      savedAt = json.savedAt || null;
      renderView();
    } catch (e) {
      if (!silencioso) root.innerHTML = '<div class="text-center py-20" style="color:var(--trj-red)">Não foi possível carregar: ' + U.esc(e.message || String(e)) + '</div>';
    }
  }

  function renderView() {
    if (view === 'welcome') renderWelcome();
    else if (view === 'mapa') renderMapaPublico();
    else renderDashboard();
  }

  // ── Mapa Operacional (versão pública, sem botão de atualização) ────────────
  function renderMapaPublico() {
    root.innerHTML = '';
    var btnVoltarMapa = U.h('button', {
      class: 'trj-btn trj-btn-ghost clickable', text: '← Dashboard',
      onclick: function () { view = 'dashboard'; renderView(); }
    });
    root.appendChild(U.h('div', { class: 'pub-topbar' }, [btnVoltarMapa, liveElGlobal()]));
    var mapaContainer = U.h('div');
    root.appendChild(mapaContainer);
    if (TRJ.pages && TRJ.pages.mapa) {
      TRJ.pages.mapa(mapaContainer, { data: raw, readOnly: true });
    } else {
      mapaContainer.appendChild(U.h('p', { style:{color:'var(--trj-muted)',padding:'20px'}, text:'Módulo de mapa não carregado.' }));
    }
  }
  function liveElGlobal() {
    return U.h('div', { class: 'pub-live' }, [
      U.h('span', { class: 'dot' }),
      U.h('span', { text: savedAt ? 'Atualizado em ' + new Date(savedAt).toLocaleString('pt-BR') : 'Dados publicados' })
    ]);
  }

  // ── Tela de boas-vindas ─────────────────────────────────────────────────────
  function renderWelcome() {
    root.innerHTML = '';
    // Contar incidentes ativos por região
    var contagemTotal = {}, contagemComTSK = {};
    var incAtivos = (raw.incidentsEnriched || []).filter(function (i) {
      return (i.statusTrat || 'ATIVO').toUpperCase() !== 'RESOLVIDO';
    });
    // "Com TSK": somente Não Iniciado + Iniciado, contabilizado por END_ID
    // (igual ao drilldown — tskAberta pega a TSK mais recente por END_ID;
    //  múltiplos sites no mesmo END_ID contam como 1 TSK)
    var tasksAtivas = (raw.tasksEnriched || []).filter(function (t) {
      var s = (t.status || '').toString().trim().toUpperCase();
      return s === 'NÃO INICIADO' || s === 'NAO INICIADO' || s === 'INICIADO';
    });

    // Contar total de incidentes por região (1 por incidente)
    incAtivos.forEach(function (i) {
      var r = i.regiao || 'OTHERS';
      contagemTotal[r] = (contagemTotal[r] || 0) + 1;
    });

    // Contar TSKs por END_ID (1 por END_ID, mesmo que tenha múltiplos sites)
    // Agrupa incidentes por END_ID por região, verifica tskAberta uma vez por END_ID
    var endIdVisto = {};  // endId → já contado
    incAtivos.forEach(function (i) {
      var endId = (i.enderecoId || i.endId || '').toString().trim();
      if (!endId) return;  // sem END_ID: não conta
      var r = i.regiao || 'OTHERS';
      var chave = r + '|' + endId;
      if (endIdVisto[chave]) return;  // END_ID já contabilizado nesta região
      endIdVisto[chave] = true;
      var tsk = U.tskAberta ? U.tskAberta(i, tasksAtivas) : null;
      if (tsk) contagemComTSK[r] = (contagemComTSK[r] || 0) + 1;
    });

    // Regiões visíveis: excluir OTHERS (aparece em todas as visualizações mas
    // não é uma região selecionável — mantida para exibição nos gráficos)
    var regioesSelecionaveis = C.REGIOES.filter(function (r) { return r !== 'OTHERS'; });

    var wrap = U.h('div', { class: 'welcome-wrap' }, [
      U.h('img', { src: 'assets/logo-trj.png', alt: '', class: 'welcome-logo' }),
      U.h('div', { class: 'welcome-title trj-heading', text: 'BEM-VINDO, GESTOR' }),
      U.h('div', { class: 'welcome-sub', text: 'Escolha sua região para visualização' }),
      U.h('div', {
        class: 'regiao-grid',
        style: { display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '16px', padding: '8px 0' }
      }, regioesSelecionaveis.map(function (r) {
        var total  = contagemTotal[r] || 0;
        var comTSK = contagemComTSK[r] || 0;
        return U.h('button', {
          class: 'regiao-btn',
          style: { minWidth: '160px', flex: '0 1 auto' },
          onclick: function () { escolherRegiao(r); }
        }, [
          U.h('div', { class: 'ic', html: REGIAO_ICONS_SVG[r] || REGIAO_ICONS_SVG['OTHERS'] }),
          U.h('div', { class: 'nome', text: (C.REGIAO_LABELS[r] || r).toUpperCase() }),
          U.h('div', { class: 'qtd', text: total + ' site(s) fora' }),
          U.h('div', { class: 'qtd', style: { fontSize: '11px', opacity: '0.85', marginTop: '2px' }, text: comTSK + ' site(s) com TSK' })
        ]);
      })),
      U.h('button', { class: 'visao-geral-btn', onclick: function () { state.regiao = 'TODAS'; view = 'dashboard'; renderDashboard(); } }, [
        U.h('span', { text: '🌐' }),
        U.h('span', { text: 'VISÃO GERAL — TODAS AS REGIÕES' })
      ]),
      U.h('button', {
        class: 'visao-geral-btn',
        style: { marginTop: '8px', background: 'rgba(52,152,219,.08)', borderColor: 'rgba(52,152,219,.3)', color: 'var(--trj-fg)' },
        onclick: function () { view = 'mapa'; renderView(); }
      }, [
        U.h('span', { text: '🗺️' }),
        U.h('span', { text: 'MAPA OPERACIONAL — SITES FORA' })
      ])
    ]);
    root.appendChild(wrap);
  }

  function escolherRegiao(r) {
    state.regiao = r; state.prioridade = 'TODAS'; view = 'dashboard'; renderDashboard();
  }

  // ── Helpers de cópia ────────────────────────────────────────────────────────
  function fmtMinutos(min) {
    if (min <= 0) return 'VENCIDO';
    if (min < 60) return min + 'min';
    var h = Math.floor(min / 60), m = min % 60;
    return h + 'h' + (m > 0 ? m + 'min' : '');
  }

  function copyText(txt) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt)
        .then(function () { U.toast('✓ Copiado!', 'ok'); })
        .catch(function () { fallbackCopy(txt); });
    } else { fallbackCopy(txt); }
    function fallbackCopy(s) {
      var ta = document.createElement('textarea');
      ta.value = s; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); U.toast('✓ Copiado!', 'ok'); }
      catch (e) { U.toast('Não foi possível copiar.', 'err'); }
      document.body.removeChild(ta);
    }
  }

  // Calcula tempo desde a última atualização real do BG (analisa bloco mais recente)
  function calcUpdateStr(bg) {
    if (!bg) return 'SEM ATUALIZAÇÃO';
    var texto = bg.toString();
    var re = /(\d{4}[\/\-]\d{2}[\/\-]\d{2}\s+\d{1,2}:\d{2}(?::\d{2})?|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}\s+\d{1,2}:\d{2}(?::\d{2})?)/g;
    var matches = [], m;
    while ((m = re.exec(texto)) !== null) {
      var dt = U.parseDataHoraBG ? U.parseDataHoraBG(m[1]) : null;
      if (dt && !isNaN(dt.getTime())) matches.push({ dt: dt, idx: m.index });
    }
    if (!matches.length) return 'SEM ATUALIZAÇÃO';
    matches.sort(function (a, b) { return b.dt - a.dt; });
    var maisRec = matches[0];
    var allByIdx = matches.slice().sort(function (a, b) { return a.idx - b.idx; });
    var posInIdx = allByIdx.findIndex(function (x) { return x.idx === maisRec.idx; });
    var endIdx = (posInIdx + 1 < allByIdx.length) ? allByIdx[posInIdx + 1].idx : texto.length;
    var bloco = texto.slice(maisRec.idx, endIdx);
    var blocoUp = bloco.toUpperCase();
    var MONITOR_FRASES = ['IDENTIFICAMOS SEU REPARO NA FILA DA TLP', 'IDENTIFICAMOS ALARMES RELACIONADOS AO SEU REPARO'];
    var ehMonitor = /MONITOR\s*CCI/i.test(bloco) && MONITOR_FRASES.some(function (f) { return blocoUp.indexOf(f) >= 0; });
    var ehWFMForm = /WFM\s*Agent/i.test(bloco) && blocoUp.indexOf('ANOTAÇÕES DE TRABALHO') >= 0 &&
      (['NOME DA OPERADORA', 'A ATIVIDADE VAI OCASIONAR', 'MOTIVO DA VISITA TÉCNICA']
        .filter(function (f) { return blocoUp.indexOf(f) >= 0; }).length >= 2);
    var ehGMGBot = /WFM\s*Agent/i.test(bloco) &&
      blocoUp.indexOf('ALTERAÇÃO NO ENVIO') >= 0 &&
      blocoUp.indexOf('JUSTIFICATIVA DA SELEÇÃO') >= 0 &&
      blocoUp.indexOf('DATA DE ATIVAÇÃO DO GERADOR') >= 0;
    if (ehMonitor || ehWFMForm || ehGMGBot) return 'SEM ATUALIZAÇÃO';
    var diffMin = Math.round((Date.now() - maisRec.dt.getTime()) / 60000);
    if (diffMin < 0) return 'ATUALIZADO AGORA';
    if (diffMin < 60) return 'ATUALIZADO A ' + diffMin + 'min';
    var h = Math.floor(diffMin / 60), mn = diffMin % 60;
    return 'ATUALIZADO A ' + h + 'h' + (mn > 0 ? mn + 'min' : '');
  }

  // Geração de texto Sites Fora — respeita filtros ativos, agrupa por END_ID
  function gerarTextoSitesFora(regiaoFiltro) {
    var regiaoEfetiva = regiaoFiltro || (state.regiao !== 'TODAS' ? state.regiao : null);
    var prioFiltro = state.prioridade !== 'TODAS' ? state.prioridade : null;
    var incAtivos = (raw.incidentsEnriched || []).filter(function (inc) {
      return (inc.statusTrat || '').toUpperCase() !== 'RESOLVIDO' &&
        (!regiaoEfetiva || (inc.regiao || 'OTHERS') === regiaoEfetiva);
    });
    var tasks = raw.tasksEnriched || [];
    var endIdMap = {};
    incAtivos.forEach(function (inc) {
      var eid = inc.enderecoId || '_sem_' + inc.site;
      if (!endIdMap[eid]) endIdMap[eid] = [];
      endIdMap[eid].push(inc);
    });
    var regioesMapa = {};
    Object.keys(endIdMap).forEach(function (eid) {
      var incs = endIdMap[eid];
      incs.sort(function (a, b) { return (a.horario || '').localeCompare(b.horario || ''); });
      var r = incs[0].regiao || 'OTHERS';
      if (!regioesMapa[r]) regioesMapa[r] = [];
      regioesMapa[r].push({ eid: eid, incs: incs, mainInc: incs[0] });
    });
    var linhas = [];
    Object.keys(regioesMapa).sort().forEach(function (r) {
      var regLabel = (C.REGIAO_LABELS[r] || r).toUpperCase();
      linhas.push('*' + regLabel + '*');
      linhas.push('*SITES FORA NA FILA*');
      var comTSK = [], semTSK = [];
      regioesMapa[r].forEach(function (grupo) {
        var tsk = U.tskAberta ? U.tskAberta(grupo.mainInc, tasks) : null;
        var tf = tsk ? tasks.filter(function (t) { return t.osNumero === tsk.osNumero; })[0] : null;
        if (prioFiltro && tf && tf.prioridade !== prioFiltro) return;
        if (prioFiltro && !tf) return;
        if (tsk) comTSK.push({ grupo: grupo, tsk: tsk, tf: tf });
        else semTSK.push(grupo);
      });
      comTSK.forEach(function (item) {
        var tf = item.tf, tsk = item.tsk;
        var prio = tf && tf.prioridade ? '*' + tf.prioridade + '* ' : '';
        var site = (tf && tf.siteId) || item.grupo.mainInc.site || '—';
        var upd = calcUpdateStr((tf || {}).motivoCancelamento || (tsk || {}).motivoCancelamento);
        linhas.push(prio + (tsk.osNumero || 'SEM TSK') + ' / ' + site + ' · ' + upd);
      });
      semTSK.forEach(function (grupo) {
        var hor = grupo.mainInc.horario || '—';
        var endId = grupo.eid.startsWith('_sem_') ? '' : (' / ' + grupo.eid);
        var sitesUnicos = [];
        grupo.incs.forEach(function (i) { if (i.site && sitesUnicos.indexOf(i.site) < 0) sitesUnicos.push(i.site); });
        linhas.push(hor + ' · SEM TSK · ' + sitesUnicos.join(', ') + endId);
      });
      linhas.push('');
    });
    return linhas.join('\n').trim();
  }

  // Geração de texto Prazos a Vencer — respeita filtros
  function gerarTextoPrazosRegiao(regiaoFiltro) {
    var now = Date.now();
    var regiaoEfetiva = regiaoFiltro || (state.regiao !== 'TODAS' ? state.regiao : null);
    var prioFiltro = state.prioridade !== 'TODAS' ? state.prioridade : null;
    var tasksVenc = (raw.tasksEnriched || []).filter(function (t) {
      return t.statusSla === 'DENTRO DO SLA' && t.vencimentoCalc &&
        (!regiaoEfetiva || (t.regiao || 'OTHERS') === regiaoEfetiva) &&
        (!prioFiltro || t.prioridade === prioFiltro);
    });
    var regioesMapa = {};
    tasksVenc.forEach(function (t) {
      var r = t.regiao || 'OTHERS';
      if (!regioesMapa[r]) regioesMapa[r] = [];
      regioesMapa[r].push(t);
    });
    var linhas = [];
    Object.keys(regioesMapa).sort().forEach(function (r) {
      var regLabel = (C.REGIAO_LABELS[r] || r).toUpperCase();
      linhas.push('*' + regLabel + '*');
      var arr = regioesMapa[r].slice().sort(function (a, b) {
        var pa = parseInt((a.prioridade || 'P9').replace(/\D/g, ''), 10) || 9;
        var pb = parseInt((b.prioridade || 'P9').replace(/\D/g, ''), 10) || 9;
        return pa !== pb ? pa - pb : new Date(a.vencimentoCalc).getTime() - new Date(b.vencimentoCalc).getTime();
      });
      arr.forEach(function (t) {
        var prio = t.prioridade ? '*' + t.prioridade + '* ' : '';
        var rest = Math.round((new Date(t.vencimentoCalc).getTime() - now) / 60000);
        var falha = (t.tipoFalha || '—').toUpperCase();
        var tempo = rest <= 0 ? 'VENCIDO' : 'VENCE EM ' + fmtMinutos(rest);
        linhas.push(prio + [(t.osNumero || '—'), (t.siteId || t.enderecoId || '—'), falha, tempo].join(' · '));
      });
      linhas.push('');
    });
    return linhas.join('\n').trim();
  }
  function gerarTextoPrazosTodasRegioes() { return gerarTextoPrazosRegiao(null); }

  // ── Export Excel (versão simplificada para dashboard público) ──────────
  function exportarExcelPublico(d, tasksEnriched, incEnriched) {
    if (typeof XLSX === 'undefined') { U.toast('Biblioteca Excel não carregou.','err'); return; }
    var wb = XLSX.utils.book_new();
    function aba(nome, aoa, ws_cols) {
      var ws = XLSX.utils.aoa_to_sheet(aoa);
      if (!ws['!freeze']) ws['!freeze'] = { ySplit: 1 };
      if (ws_cols) ws['!cols'] = ws_cols.map(function(w){ return { wch: w }; });
      XLSX.utils.book_append_sheet(wb, ws, nome.slice(0,31));
    }
    var K = d.kpis || {};
    aba('DASHBOARD', [
      ['INDICADOR','VALOR'],
      ['FORA DO SLA', K.foraSla||0], ['BACKLOG TOTAL', K.backlogTotal||0],
      ['BACKLOG INDEFINIDO', K.backlogIndef||0], ['PREDITIVA', K.preditiva||0],
      ['PRODUTIVIDADE', K.produtividade||0], ['SLA GERAL (%)', K.slaGeral||0],
      ['REGION', state.regiao], ['PRIORIDADE', state.prioridade],
      ['GERADO EM', new Date().toLocaleString('pt-BR')]
    ], [40, 20]);
    var D2 = TRJ.domain;
    var sep = D2.separarTicketsManuais(tasksEnriched||[]);
    var tickets = sep.tickets;
    var backlog = tickets.filter(function(t){
      var s=(t.status||'').toUpperCase().trim();
      return (s==='NÃO INICIADO'||s==='NAO INICIADO'||s==='INICIADO')&&!!t.dataCriacaoAS;
    });
    var cols = [['TSK',20],['STATUS',14],['PRIORIDADE',12],['REGIÃO',16],['CIDADE',20],['END_ID',16],['SITE',16],['TIPO FALHA',22],['FILA',40],['SLA',16],['CRIAÇÃO NTT',20]];
    var hdrs = cols.map(function(c){return c[0];});
    var aoa = [hdrs].concat(backlog.slice(0,2000).map(function(t){
      return [t.osNumero,t.status,t.prioridade,t.regiao,t.cidade,t.enderecoId,t.siteId,t.tipoFalha,t.filaAtual,t.statusSla,t.dataCriacaoAS];
    }));
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!freeze'] = { ySplit:1 };
    ws['!cols'] = cols.map(function(c){return {wch:c[1]};});
    XLSX.utils.book_append_sheet(wb, ws, 'BACKLOG');
    var incAtivos = (incEnriched||[]).filter(function(i){ return (i.statusTrat||'ATIVO').toUpperCase()!=='RESOLVIDO'; });
    var aoa2 = [['HORÁRIO','DURAÇÃO','SITE','END_ID','CIDADE/UF','REGIÃO','CAUSA','DETALHE','STATUS']]
      .concat(incAtivos.map(function(i){
        return [i.horario,i.downtime,i.site,i.enderecoId,i.cidadeUf,i.regiao,i.causa,i.detalhe,i.statusTrat];
      }));
    var ws2 = XLSX.utils.aoa_to_sheet(aoa2);
    ws2['!freeze'] = {ySplit:1};
    ws2['!cols'] = [12,10,20,16,22,16,30,40,16].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb, ws2, 'SITES FORA');
    var ts = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    XLSX.writeFile(wb, 'Dashboard_TRJ_Pub_' + ts + '.xlsx');
    U.toast('Excel exportado!', 'ok');
  }

  // ── Dashboard ───────────────────────────────────────────────────────────────
  function renderDashboard() {
    root.innerHTML = '';
    var d = Comp.dashboard(raw.tasksEnriched, raw.incidentsEnriched, state) || {};
    var f = state;
    var topCidades = d.topCidades || {};
    var kpis = [
      { label: 'FORA DO SLA', value: d.kpis ? d.kpis.foraSla : 0, cor: C.CORES_TRJ.red, spec: { tipo: 'foraSla' }, t: 'Fora do SLA' },
      { label: 'BACKLOG TOTAL', value: d.kpis ? d.kpis.backlogTotal : 0, cor: C.CORES_TRJ.orange, spec: { tipo: 'backlogTotal' }, t: 'Backlog total' },
      { label: 'BACKLOG INDEFINIDO', value: d.kpis ? d.kpis.backlogIndef : 0, cor: C.CORES_TRJ.orange2, spec: { tipo: 'backlogIndef' }, t: 'Backlog indefinido' },
      { label: 'PREDITIVA', value: d.kpis ? d.kpis.preditiva : 0, cor: '#3498db', spec: { tipo: 'preditiva' }, t: 'Preditiva' },
      { label: 'PRODUTIVIDADE', value: d.kpis ? d.kpis.produtividade : 0, cor: C.CORES_TRJ.green, spec: { tipo: 'produtividade' }, opts: { modoResultado: true }, t: 'TSKs concluídas' },
      { label: 'SLA GERAL', value: d.kpis ? (d.kpis.slaGeral + '%') : '—', cor: C.CORES_TRJ.green, spec: { tipo: 'produtividade' }, opts: { modoResultado: true }, t: 'TSKs concluídas — % dentro do prazo' }
    ];

    // Topbar
    var btnVoltar = U.h('button', { class: 'trj-btn trj-btn-ghost clickable', text: '← Regiões', onclick: function () { view = 'welcome'; renderView(); } });
    var liveEl = U.h('div', { class: 'pub-live' }, [
      U.h('span', { class: 'dot' }),
      U.h('span', { text: savedAt ? 'Atualizado em ' + new Date(savedAt).toLocaleString('pt-BR') : 'Dados publicados' })
    ]);
    // Filtro de prioridade
    var prioSelect = U.h('select', {
      class: 'trj-btn trj-btn-ghost',
      style: { padding: '4px 10px', fontSize: '12px', cursor: 'pointer', border: '1px solid rgba(255,255,255,.15)', borderRadius: '6px', background: 'var(--trj-card2)', color: 'var(--trj-text)' }
    }, [U.h('option', { value: 'TODAS', text: 'Todas as prioridades' })]
    .concat(['P1','P2','P3','P4','P5'].map(function(p){ return U.h('option', { value: p, text: p }); })));
    prioSelect.value = state.prioridade || 'TODAS';
    prioSelect.addEventListener('change', function () {
      state.prioridade = prioSelect.value;
      root.innerHTML = ''; renderDashboard();
    });

    root.appendChild(U.h('div', { class: 'pub-topbar' }, [
      btnVoltar,
      liveEl,
      U.h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } }, [
        prioSelect,
        U.h('button', {
          class: 'trj-btn clickable',
          style: { fontSize: '12px', padding: '4px 12px', background: 'rgba(52,152,219,.15)', color: '#3498db', border: '1px solid rgba(52,152,219,.3)', borderRadius: '6px', display: 'inline-flex', alignItems: 'center', gap: '5px' },
          onclick: function () { view = 'mapa'; renderView(); }
        }, [U.h('span', {text:'Mapa'})]),
        U.h('button', {
          class: 'trj-btn clickable',
          style: { fontSize: '12px', padding: '4px 12px', background: 'rgba(46,204,113,.15)', color: '#2ecc71', border: '1px solid rgba(46,204,113,.3)', borderRadius: '6px', display: 'inline-flex', alignItems: 'center', gap: '5px' },
          onclick: function () { exportarExcelPublico(d, raw.tasksEnriched, raw.incidentsEnriched); }
        }, [U.h('span', {text:'📊'}), U.h('span', {text:'Excel'})])
      ])
    ]));
    root.appendChild(U.h('div', { class: 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-4' }, kpis.map(function (k) {
      return U.kpiCard({ label: k.label, value: k.value, cor: k.cor, onClick: k.spec ? function (kk) { return function () { openDrillTasks(kk.spec, f, kk.t, kk.opts || {}); }; }(k) : null });
    })));

    // Charts: Aging + Prazos a Vencer (com botão copiar)
    var aging = U.chartCard('AGING DO BACKLOG');
    var vencBtnCopiar = U.h('button', {
      class: 'trj-btn trj-btn-ghost clickable',
      style: { fontSize: '11px', padding: '2px 9px', display: 'inline-flex', alignItems: 'center', gap: '5px', border: '1px solid rgba(255,255,255,.15)' },
      onclick: function () { copyText(gerarTextoPrazosTodasRegioes()); }
    }, [U.h('span', { text: '📋' }), U.h('span', { text: 'Copiar' })]);
    var venc = U.chartCard('PRAZOS A VENCER', { rightEl: vencBtnCopiar });

    // Sites Fora: toggle + botão copiar
    var sfAgrupar = { value: false };
    var switchSf = U.switch(false, 'AGRUPAR POR END_ID', function (v) { sfAgrupar.value = v; });
    var btnCopiarSF = U.h('button', {
      class: 'trj-btn trj-btn-ghost clickable',
      style: { fontSize: '11px', padding: '2px 9px', display: 'inline-flex', alignItems: 'center', gap: '5px', border: '1px solid rgba(255,255,255,.15)' },
      onclick: function () { copyText(gerarTextoSitesFora(null)); }
    }, [U.h('span', { text: '📋' }), U.h('span', { text: 'Copiar' })]);
    var sfControls = U.h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } }, [switchSf, btnCopiarSF]);
    var sites = U.chartCard('SITES FORA POR REGIÃO', { rightEl: sfControls });

    var slaReg = U.chartCard('SLA POR REGIÃO');
    var manu = U.chartCard('ATIVIDADES MANUAIS', { hint: 'inclui cancelamentos' });
    var prod = U.chartCard('PRODUTIVIDADE — ENCERRADAS DENTRO/FORA DO SLA');
    root.appendChild(U.h('div', { class: 'grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5' }, [aging.card, venc.card, sites.card, slaReg.card, manu.card, prod.card]));
    root.appendChild(buildTopCidades(topCidades));

    var aData = d.aging || [], vData = d.prazosVencimento || [], sfData = d.sitesForaRegiao || [], srData = d.slaPorRegiao || [], amData = d.atividadesManuais || [], pData = d.produtividade || [];

    U.barChart(aging.canvas, aData, { onBar: function (i) { openDrillTasks({ tipo: 'aging', arg: i }, f, 'AGING: ' + aData[i].label); } });
    U.hbarChart(venc.canvas, vData, { onBar: function (i) {
      var bucket = vData[i];
      var onCopyDrill = function () {
        var now = Date.now();
        var b = C.VENCIMENTO_BUCKETS[i];
        var tasks = (raw.tasksEnriched || []).filter(function (t) {
          if (t.statusSla !== 'DENTRO DO SLA' || !t.vencimentoCalc) return false;
          var rest = Math.round((new Date(t.vencimentoCalc).getTime() - now) / 60000);
          return rest >= 0 && rest >= b.min && rest < b.max;
        });
        var linhas = ['*' + ('A VENCER: ' + (bucket.label || '')).toUpperCase() + '*', ''];
        var rmap = {};
        tasks.forEach(function (t) { var r = t.regiao || 'OTHERS'; if (!rmap[r]) rmap[r] = []; rmap[r].push(t); });
        Object.keys(rmap).sort().forEach(function (r) {
          linhas.push('*' + (C.REGIAO_LABELS[r] || r).toUpperCase() + '*');
          rmap[r].slice().sort(function (a, b2) {
            var pa = parseInt((a.prioridade || 'P9').replace(/\D/g, ''), 10) || 9;
            var pb = parseInt((b2.prioridade || 'P9').replace(/\D/g, ''), 10) || 9;
            return pa !== pb ? pa - pb : new Date(a.vencimentoCalc).getTime() - new Date(b2.vencimentoCalc).getTime();
          }).forEach(function (t) {
            var prio = t.prioridade ? '*' + t.prioridade + '* ' : '';
            var rest = Math.round((new Date(t.vencimentoCalc).getTime() - now) / 60000);
            linhas.push(prio + (t.osNumero || '—') + ' · ' + (t.siteId || t.enderecoId || '—') + ' · ' + (t.tipoFalha || '—').toUpperCase() + ' · VENCE EM ' + fmtMinutos(rest));
          });
          linhas.push('');
        });
        return linhas.join('\n').trim();
      };
      openDrillTasks({ tipo: 'vencimento', arg: i }, f, 'A VENCER: ' + (bucket.label || ''), {}, onCopyDrill);
    }});
    U.barChart(sites.canvas, sfData.map(function (x) { return { label: x.label.toUpperCase(), total: x.total, cor: C.CORES_TRJ.red }; }), {
      onBar: function (i) {
        var tipo = sfAgrupar.value ? 'sitesForaAgrupado' : 'sitesFora';
        var regiao = sfData[i].regiao;
        var titulo = 'SITES FORA: ' + (sfData[i].label || '').toUpperCase();
        openDrillIncidents({ tipo: tipo, arg: regiao }, titulo, {
          onCopy: function () { return gerarTextoSitesFora(regiao); }
        });
      }
    });
    U.stackedChart(slaReg.canvas, srData, { onSeg: function (i, ds) { var r = srData[i]; openDrillTasks({ tipo: 'slaRegiao', arg: r.regiao + '|' + (ds === 1 ? 'fora' : 'dentro') }, f, 'SLA ' + r.label); } });
    U.donutChart(manu.canvas, amData, {
      cores: C.DONUT_CORES,
      onSlice: function (i) {
        var nm = amData[i].name;
        var ehCancel = nm.indexOf('Cancel.') === 0;
        var spec = ehCancel ? { tipo: 'cancelCorretiva', arg: nm.indexOf('Associa') >= 0 ? 'assoc' : 'auto' } : { tipo: 'atividades', arg: argAtiv(nm) };
        openDrillTasks(spec, f, nm, ehCancel ? { modoCancelamento: true } : {});
      }
    });
    U.stackedChart(prod.canvas, pData.map(function (p) { return { label: p.categoria, dentro: p.dentro, fora: p.fora, preditiva: p.preditiva }; }), {
      onSeg: function (i, ds) {
        var cat = pData[i].categoria;
        var lado = ds === 2 ? 'preditiva' : (ds === 1 ? 'fora' : 'dentro');
        openDrillTasks({ tipo: 'produtividadeCat', arg: cat + '|' + lado }, f, 'Produtividade ' + cat, { modoResultado: true });
      }
    });
  }

  function argAtiv(name) {
    if (/WO/i.test(name)) return 'wo';
    if (/Prevent/i.test(name)) return 'prev';
    if (/Conjunta/i.test(name)) return 'conj';
    return 'outras';
  }

  // ── Top Cidades (Total clicável) ────────────────────────────────────────────
  function buildTopCidades(tc) {
    var porAnf = tc.porAnf || [], cidades = tc.cidades || [];
    var anfList = U.h('div', { class: 'flex flex-wrap gap-2 mb-4' }, porAnf.map(function (a) {
      var chip = U.h('button', {
        class: 'trj-btn trj-btn-ghost',
        style: { fontSize: '12px', transition: 'all .2s ease' },
        onclick: function () { openDrillIncidents({ tipo: 'anf', arg: a.anfRaw }, a.anf); }
      }, [
        U.h('span', { class: 'font-bold', text: a.anf }),
        U.h('span', { style: { color: 'var(--trj-primary)', marginLeft: '6px' }, text: String(a.total) }),
        U.h('span', { style: { color: 'var(--trj-muted)', marginLeft: '4px', fontSize: '11px' }, text: '(' + a.pct + '%)' })
      ]);
      chip.addEventListener('mouseenter', function () { chip.style.transform = 'translateY(-2px)'; chip.style.borderColor = 'rgba(255,140,0,.6)'; chip.style.boxShadow = '0 6px 16px rgba(255,140,0,.2)'; });
      chip.addEventListener('mouseleave', function () { chip.style.transform = ''; chip.style.borderColor = ''; chip.style.boxShadow = ''; });
      return chip;
    }));
    var bars = U.h('div', { class: 'flex flex-col gap-1' }, cidades.slice(0, 15).map(function (c) {
      var barra = U.h('div', { style: { width: c.pct + '%', height: '8px', borderRadius: '6px', background: 'var(--trj-primary)', transition: 'all .2s ease' } });
      var item = U.h('div', { style: { cursor: 'pointer', padding: '5px 8px', borderRadius: '8px', transition: 'background .18s ease' } }, [
        U.h('div', { class: 'flex justify-between text-xs mb-1' }, [
          U.h('span', { style: { fontWeight: '600' }, text: c.cidade }),
          U.h('span', { style: { color: 'var(--trj-primary)', fontWeight: '700' }, text: String(c.total) })
        ]),
        U.h('div', { style: { background: 'rgba(255,255,255,.07)', borderRadius: '6px', height: '8px', overflow: 'hidden' } }, barra)
      ]);
      item.addEventListener('mouseenter', function () { item.style.background = 'rgba(255,140,0,.1)'; barra.style.background = 'var(--trj-primary2)'; barra.style.boxShadow = '0 0 10px rgba(255,140,0,.5)'; });
      item.addEventListener('mouseleave', function () { item.style.background = ''; barra.style.background = 'var(--trj-primary)'; barra.style.boxShadow = ''; });
      item.addEventListener('click', function () { openDrillIncidents({ tipo: 'cidade', arg: c.cidade }, c.cidade); });
      return item;
    }));
    // Total Sites Fora — clicável (todos os incidentes)
    var total = U.h('div', {
      class: 'trj-card p-5 flex flex-col items-center justify-center clickable',
      style: { minWidth: '180px', cursor: 'pointer' },
      title: 'Clique para ver todos os sites fora',
      onclick: function () { openDrillIncidents({ tipo: 'sitesFora', arg: null }, 'TODOS OS SITES FORA'); }
    }, [
      U.h('div', { class: 'text-xs uppercase', style: { color: 'var(--trj-muted)' }, text: 'TOTAL SITES FORA' }),
      U.h('div', { class: 'font-extrabold', style: { fontSize: '56px', color: C.CORES_TRJ.red, lineHeight: '1', textShadow: '0 0 20px rgba(231,76,60,.4)' }, text: U.fmtNum(tc.totalSitesFora) }),
      U.h('div', { style: { fontSize: '10px', color: 'var(--trj-muted)', marginTop: '4px' }, text: '▼ ver incidentes' })
    ]);
    return U.h('div', { class: 'trj-card p-4' }, [
      U.h('div', { class: 'flex items-center gap-2 mb-3' }, [
        U.h('span', { class: 'trj-chart-dot' }),
        U.h('h3', { class: 'text-sm font-bold', text: 'TOP CIDADES — SITES FORA' }),
        U.h('span', { class: 'text-xs font-normal', style: { color: 'var(--trj-muted)' }, text: '(clique em qualquer cidade ou ANF para detalhar)' })
      ]),
      U.h('div', { class: 'grid grid-cols-1 lg:grid-cols-3 gap-4' }, [total, U.h('div', { class: 'lg:col-span-2' }, [anfList, bars])])
    ]);
  }

  // ── Drills ──────────────────────────────────────────────────────────────────
  function openDrillTasks(spec, filtros, title, opts, onCopy) {
    var rows = Comp.drillTasks(raw.tasksEnriched, spec, filtros || {});
    U.openModal(title || 'Detalhamento', U.taskTable(rows, opts || {}), {
      onCopy: onCopy || function () { return U.taskTableCopyText(rows, title); }
    });
  }
  function openDrillIncidents(spec, title, opts) {
    opts = opts || {};
    var rows = Comp.drillIncidents(raw.incidentsEnriched, spec);
    U.openModal(title || 'Detalhamento', U.incidentTable(rows, raw.tasksEnriched), {
      onCopy: opts.onCopy || function () { return U.incidentTableCopyText(rows, title); }
    });
  }

  document.getElementById('dev-footer-mount').appendChild(U.devFooter());
  carregarDados();
  setInterval(function () { carregarDados(true); }, 60000);
})();
</script>
