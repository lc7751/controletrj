<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle TRJ · Dashboard (visualização pública)</title>
<link rel="icon" href="assets/logo-trj.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --card:#13131a; --popover:#1a1a24; --primary:#ff8c00;
  --red:#e74c3c; --green:#2ecc71; --blue:#3498db; --fg:#f0f0f0; --muted:#8a8a93;
  --border:rgba(255,140,0,0.15); --border2:rgba(255,140,0,0.32);
}
* { box-sizing: border-box; }
html,body { margin:0; background:var(--bg); color:var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse at 10% 0%, rgba(255,140,0,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, rgba(255,80,0,0.07) 0%, transparent 50%);
}
.wrap { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:20px 22px 50px; }
.heading { font-family:'Sora',sans-serif; letter-spacing:-0.01em; }
header { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
header h1 { font-size:24px; font-weight:800; margin:0; display:flex; align-items:center; gap:10px; }
header h1 img { width:38px; height:38px; object-fit:contain; }
.meta { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); display:inline-block; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
.btn { background:var(--card); border:1px solid var(--border); color:var(--fg); border-radius:9px; padding:7px 13px; font-size:13px; cursor:pointer; transition:border-color .15s ease; }
.btn:hover { border-color:var(--border2); }

.kpi-row { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; margin-bottom:18px; }
@media (max-width:1100px) { .kpi-row { grid-template-columns:repeat(4,1fr); } }
@media (max-width:640px) { .kpi-row { grid-template-columns:repeat(2,1fr); } }
.kpi { position:relative; overflow:hidden; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 14px; }
.kpi .bar { position:absolute; top:0; left:0; right:0; height:3px; }
.kpi .label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
.kpi .value { font-size:24px; font-weight:800; line-height:1; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
@media (max-width:900px) { .grid2 { grid-template-columns:1fr; } }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
.card h3 { font-size:13px; font-weight:700; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--primary); box-shadow:0 0 8px var(--primary); flex-shrink:0; }
.chart-wrap { position:relative; height:260px; }

.resumo-bar { display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center; background:rgba(255,140,0,.05); border:1px solid var(--border); border-radius:10px; padding:8px 14px; margin-bottom:14px; }
.resumo-total { display:flex; align-items:baseline; gap:7px; padding-right:14px; border-right:1px solid var(--border2); }
.resumo-total b { font-size:22px; color:var(--red); text-shadow:0 0 12px rgba(231,76,60,.35); }
.resumo-grid { display:flex; flex-wrap:wrap; gap:6px 8px; flex:1; }
.chip { display:flex; align-items:center; gap:5px; padding:3px 9px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:999px; font-size:12px; }
.chip b { color:var(--fg); }
.loading, .erro { text-align:center; padding:60px 20px; color:var(--muted); }
.erro { color:var(--red); }
footer { text-align:center; font-size:11px; color:var(--muted); margin-top:30px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="heading"><img src="assets/logo-trj.png" alt=""> Controle TRJ — Dashboard</h1>
    <div class="meta">
      <span class="live-dot"></span>
      <span id="metaTxt">Carregando...</span>
      <button class="btn" onclick="carregar()">🔄 Atualizar agora</button>
    </div>
  </header>
  <div id="conteudo"><div class="loading">Carregando dados publicados...</div></div>
  <footer>Visualização somente leitura · atualiza automaticamente a cada 60s</footer>
</div>
<script>
var URL_API = (window.TRJ && TRJ.config && TRJ.config.APPS_SCRIPT_URL) || '';
var charts = [];
function destruirCharts() { charts.forEach(function (c) { try { c.destroy(); } catch (e) {} }); charts = []; }

function fmtNum(n) { return (n == null || isNaN(n)) ? '0' : Number(n).toLocaleString('pt-BR'); }

function kpiCard(label, value, cor) {
  return '<div class="kpi"><div class="bar" style="background:' + cor + '"></div>' +
    '<div class="label">' + label + '</div>' +
    '<div class="value" style="color:' + cor + '">' + value + '</div></div>';
}

function chartCard(id, titulo) {
  return '<div class="card"><h3><span class="dot"></span>' + titulo + '</h3>' +
    '<div class="chart-wrap"><canvas id="' + id + '"></canvas></div></div>';
}

function baseOpts(horizontal) {
  return {
    indexAxis: horizontal ? 'y' : 'x', responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false, labels: { color: '#9a9aa3' } } },
    scales: {
      x: { ticks: { color: '#9a9aa3', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,.06)' } },
      y: { ticks: { color: '#9a9aa3', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,.06)' }, beginAtZero: true }
    }
  };
}

function barChart(canvasId, data, cor) {
  var el = document.getElementById(canvasId); if (!el) return;
  var o = baseOpts(false);
  charts.push(new Chart(el, { type: 'bar', data: { labels: data.map(function (d) { return d.label; }), datasets: [{ data: data.map(function (d) { return d.total; }), backgroundColor: cor, borderRadius: 4, maxBarThickness: 46 }] }, options: o }));
}
function hbarChart(canvasId, data, cor) {
  var el = document.getElementById(canvasId); if (!el) return;
  var o = baseOpts(true);
  charts.push(new Chart(el, { type: 'bar', data: { labels: data.map(function (d) { return d.cidade || d.label; }), datasets: [{ data: data.map(function (d) { return d.total; }), backgroundColor: cor, borderRadius: 4, maxBarThickness: 22 }] }, options: o }));
}
function stackedChart(canvasId, data, l3) {
  var el = document.getElementById(canvasId); if (!el) return;
  var o = baseOpts(false);
  o.scales.x.stacked = true; o.scales.y.stacked = true; o.plugins.legend.display = true;
  var temPred = l3 && data.some(function (d) { return d.preditiva > 0; });
  var ds = [
    { label: 'Dentro', data: data.map(function (d) { return d.dentro; }), backgroundColor: '#2ecc71', borderRadius: 4, maxBarThickness: 46 },
    { label: 'Fora', data: data.map(function (d) { return d.fora; }), backgroundColor: '#e74c3c', borderRadius: 4, maxBarThickness: 46 }
  ];
  if (temPred) ds.push({ label: 'Preditiva', data: data.map(function (d) { return d.preditiva || 0; }), backgroundColor: '#ff8c00', borderRadius: 4, maxBarThickness: 46 });
  charts.push(new Chart(el, { type: 'bar', data: { labels: data.map(function (d) { return d.label || d.categoria; }), datasets: ds }, options: o }));
}
var DONUT_CORES = ['#ff8c00', '#3498db', '#9b59b6', '#2ecc71', '#e74c3c', '#ffb347'];
function donutChart(canvasId, data) {
  var el = document.getElementById(canvasId); if (!el) return;
  charts.push(new Chart(el, {
    type: 'doughnut',
    data: { labels: data.map(function (d) { return d.name; }), datasets: [{ data: data.map(function (d) { return d.value; }), backgroundColor: data.map(function (d, i) { return DONUT_CORES[i % DONUT_CORES.length]; }), borderColor: '#13131a', borderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'right', labels: { color: '#9a9aa3', font: { size: 11 }, boxWidth: 12 } } } }
  }));
}

function render(d) {
  destruirCharts();
  var K = d.kpis || {};
  var tc = d.topCidades || { totalSitesFora: 0, porAnf: [], cidades: [] };
  var html = '';

  html += '<div class="kpi-row">';
  html += kpiCard('Fora do SLA', fmtNum(K.foraSla), '#e74c3c');
  html += kpiCard('Backlog Total', fmtNum(K.backlogTotal), '#ff8c00');
  html += kpiCard('Backlog Indef.', fmtNum(K.backlogIndef), '#9aa5b1');
  html += kpiCard('Preditiva', fmtNum(K.preditiva), '#3498db');
  html += kpiCard('Produtividade', fmtNum(K.produtividade), '#2ecc71');
  html += kpiCard('SLA Geral', (K.slaGeral || 0) + '%', '#ffb347');
  html += kpiCard('Sites Fora', fmtNum(tc.totalSitesFora), '#e74c3c');
  html += '</div>';

  if (tc.totalSitesFora) {
    html += '<div class="resumo-bar"><div class="resumo-total">Sites Fora <b>' + fmtNum(tc.totalSitesFora) + '</b></div><div class="resumo-grid">';
    (tc.porAnf || []).forEach(function (a) { if (a.total) html += '<div class="chip">ANF ' + a.anf + ' <b>' + a.total + '</b> (' + a.pct + '%)</div>'; });
    html += '</div></div>';
  }

  html += '<div class="grid2">' + chartCard('cAging', 'Aging do Backlog') + chartCard('cVenc', 'Prazos a Vencer') + '</div>';
  html += '<div class="grid2">' + chartCard('cSites', 'Sites Fora por Região') + chartCard('cSla', 'SLA por Região') + '</div>';
  html += '<div class="grid2">' + chartCard('cManu', 'Atividades Manuais') + chartCard('cProd', 'Produtividade Encerramento') + '</div>';
  html += '<div class="card">' + '<h3><span class="dot"></span>Top Cidades — Sites Fora</h3><div class="chart-wrap" style="height:340px"><canvas id="cCidades"></canvas></div></div>';

  document.getElementById('conteudo').innerHTML = html;

  barChart('cAging', d.aging || [], '#ff8c00');
  barChart('cVenc', d.prazosVencimento || [], '#3498db');
  barChart('cSites', d.sitesForaRegiao || [], '#e74c3c');
  stackedChart('cSla', d.slaPorRegiao || [], false);
  donutChart('cManu', d.atividadesManuais || []);
  stackedChart('cProd', d.produtividade || [], true);
  hbarChart('cCidades', (tc.cidades || []).slice(0, 20), '#ff8c00');

  var ts = d.atualizadoEm ? new Date(d.atualizadoEm) : null;
  document.getElementById('metaTxt').textContent = ts ? ('Atualizado em ' + ts.toLocaleString('pt-BR')) : 'Sem dados publicados ainda';
}

async function carregar() {
  if (!URL_API) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">URL do Apps Script não configurada (js/config.js).</div>';
    return;
  }
  try {
    var resp = await fetch(URL_API + '?action=getDashboardSnapshot');
    var json = await resp.json();
    if (!json || json.ok === false) throw new Error((json && json.error) || 'Erro ao buscar dados.');
    if (!json.data) {
      document.getElementById('conteudo').innerHTML = '<div class="loading">Ainda não há nenhuma publicação. Abra o Dashboard no painel principal pelo menos uma vez.</div>';
      return;
    }
    render(json.data);
  } catch (e) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Não foi possível carregar: ' + (e.message || e) + '</div>';
  }
}

carregar();
setInterval(carregar, 60000); // atualiza sozinho a cada 60s
</script>
</body>
</html>
